<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>错题笔记本</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>错题笔记本</h1>
      <div class="toolbar">
        <span id="selectionInfo" class="selection-info hidden"></span>
        <button id="importBtn" class="btn btn-primary">导入截图</button>
        <button id="exportPdfBtn" class="btn btn-secondary">导出PDF</button>
        <button id="settingsBtn" class="btn-icon" title="设置">⚙</button>
      </div>
    </header>

    <div class="main-content">
      <aside id="sidebar" class="sidebar">
        <section class="sidebar-section">
          <h3>筛选标签</h3>
          <div id="filterTags" class="filter-tags"></div>
          <div class="random-pick">
            <input type="number" id="randomCount" min="1" value="1" class="input-sm" title="抽取数量">
            <button id="randomPickBtn" class="btn btn-sm btn-accent">随机抽取</button>
          </div>
          <button id="clearFilterBtn" class="btn btn-sm btn-ghost">清除筛选</button>
        </section>

        <section class="sidebar-section">
          <h3>标签管理</h3>
          <div class="add-tag-form">
            <input type="text" id="newTagName" placeholder="标签名称" maxlength="20">
            <input type="color" id="newTagColor" value="#3b82f6">
            <select id="newTagParent" class="input-sm" style="width:100%;margin-top:4px">
              <option value="">(顶级标签)</option>
            </select>
            <button id="addTagBtn" class="btn btn-sm btn-primary" style="margin-top:4px">添加</button>
          </div>
          <ul id="tagList" class="tag-list"></ul>
        </section>
      </aside>

      <main id="imageGrid" class="image-grid">
        <div id="dropZone" class="drop-zone">
          <div class="drop-zone-content">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
            </svg>
            <p>拖拽图片到此处导入</p>
            <p class="hint">或点击上方「导入截图」按钮</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <div id="contextMenu" class="context-menu hidden">
    <div class="context-item" data-action="tagManage">管理标签</div>
    <div class="context-item context-item-danger" data-action="delete">删除图片</div>
  </div>

  <!-- Tag manage modal -->
  <div id="modal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalTitle">标题</h3>
        <button class="modal-close">&times;</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Image preview modal -->
  <div id="previewModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="preview-container">
      <button class="modal-close preview-close">&times;</button>
      <span class="preview-nav preview-prev">&lt;</span>
      <img id="previewImage" src="" alt="">
      <span class="preview-nav preview-next">&gt;</span>
      <div class="preview-info">
        <span id="previewName"></span>
        <span id="previewTags" class="image-card-tags"></span>
      </div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>设置</h3>
        <button class="modal-close" id="settingsModalClose">&times;</button>
      </div>
      <div id="settingsBody" style="padding:14px 18px">
        <div class="setting-row">
          <div>
            <div class="setting-label">深色模式</div>
            <div class="setting-desc">切换深色/浅色主题</div>
          </div>
          <label class="toggle">
            <input type="checkbox" id="darkModeToggle">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="setting-row">
          <div style="flex:1;margin-right:12px">
            <div class="setting-label">截图存储位置</div>
            <div class="setting-dir" id="settingStorageDir">默认位置</div>
          </div>
          <button id="chooseDirBtn" class="btn btn-sm btn-secondary">更改</button>
        </div>
        <div style="margin-top:14px;text-align:right">
          <button id="settingsSaveBtn" class="btn btn-primary btn-sm">保存</button>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
